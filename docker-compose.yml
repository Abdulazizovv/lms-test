services:
  lms:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3404:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    volumes:
      - lms_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');const port=process.env.PORT||3000;const req=http.get({host:'127.0.0.1',port,path:'/'},(r)=>process.exit(r.statusCode<500?0:1));req.on('error',()=>process.exit(1));",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  lms_data:
